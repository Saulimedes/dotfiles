# Tell pinentry-emacs to connect to the running Emacs server.
# gpg-agent (via systemd socket activation) inherits this and passes it
# to pinentry-emacs when gpg needs a passphrase.
# Without this, PUTENV would be needed to set it post-hoc, but GnuPG 2.3+
# removed PUTENV from the gpg-agent Assuan protocol.
INSIDE_EMACS=1
# Route SSH through gpg-agent so pinentry-emacs handles SSH key prompts too
SSH_AUTH_SOCK=/run/user/1000/gnupg/S.gpg-agent.ssh
