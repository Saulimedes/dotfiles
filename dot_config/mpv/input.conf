# mpv keybindings
PGUP seek 600
PGDWN seek -600
l seek 5
h seek -5
k seek -60
j seek 60
RIGHT seek  10
LEFT  seek -10
TAB cycle program
U stop
S cycle sub
Q quit-watch-later 0
q quit 0
P show-progress
ESC quit 0
q quit-watch-later
F2 cycle_values video-aspect "16:9" "16:10" "4:3" "2.35:1" "-1"
MOUSE_BTN3 add volume 2
MOUSE_BTN4 add volume -2
I show_text "${filename}"
> playlist-next; show-text ${playlist}
n playlist-next; show-text ${playlist}
< playlist-prev; show-text ${playlist}
p playlist-prev; show-text ${playlist}

MOUSE_BTN3 add volume  1
MOUSE_BTN4 add volume -1

D cycle deinterlace
d cycle framedrop

Ctrl+k cycle keep-open
Ctrl+q quit-watch-later

SHIFT+N playlist-next force
SHIFT+P playlist-prev force

ENTER cycle pause

# Toggle deband (fixes color banding on compressed streams)
b cycle deband

# Audio normalization toggle
Alt+n cycle-values af "dynaudnorm=f=200:g=5:r=0.9:p=0.5" ""

# Speed controls
[ multiply speed 0.9
] multiply speed 1.1
BS set speed 1.0

# mpv360 - 360° video (Ctrl+e toggle, Ctrl+click mouse look, Ctrl+arrows pan)
# SBS videos auto-crop to left eye; Ctrl+e removes crop + enables 360° mode
# gif-generator (g=start, G=end, Ctrl+g=render, Ctrl+G=render+subs)
# webm (W opens interactive clip menu)
