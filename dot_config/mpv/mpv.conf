# Basic Settings - Minimal and Stable
autofit-larger=80%x80%
geometry=50%:50%
fs=no
screen=0
correct-pts=yes
volume-max=200
title=${media-title}
keep-open=no
stop-screensaver=yes
watch-later-directory=~/.local/share/mpv/watch_later
save-position-on-quit=yes

# Screenshots
screenshot-format=png
screenshot-directory=~/Pictures/mpv-screenshots
screenshot-template="%F-%P"

# Subtitles
sub-auto=fuzzy
sub-font-size=40
slang=en,eng

# Audio: prefer original/English track
alang=en,eng

# ui
osd-level=1
osd-font-size=32
osd-duration=2000
quiet

# Cache Settings
cache=yes
cache-secs=30
cache-pause=yes
demuxer-max-bytes=150MiB
demuxer-max-back-bytes=50MiB

# Video Settings
vo=gpu-next
hwdec=auto-safe
video-sync=audio
hr-seek=yes
hr-seek-framedrop=yes
deband=no

# Audio Sync Settings
audio-pitch-correction=yes
audio-buffer=1.0
audio-stream-silence=no
gapless-audio=no

# YouTube-DL / yt-dlp Settings
# Prefer h264+aac (no remux needed, faster startup) then fall back to best
ytdl-format=bestvideo[height<=?1080][vcodec^=avc1]+bestaudio[acodec^=mp4a]/bestvideo[height<=?1080]+bestaudio/best
load-unsafe-playlists=yes
input-ipc-server=/tmp/mpv-socket

# Loop Settings for Specific Extensions
[extension.gif]
loop-file=inf

[extension.webm]
loop-file=inf

[extension.jpg]
pause

[extension.png]
pause

# Audio Profile
[audio]
video=no
force-window=yes
force-window=immediate
ytdl-format=bestaudio
script-opts=osc-layout=box,osc-boxalpha=255

[extension.mp3]
profile=audio

# SMB Protocol
[protocol.smb]
cache-secs=30
demuxer-max-bytes=150MiB
demuxer-max-back-bytes=50MiB
demuxer-readahead-secs=30

# Terminal Settings
[terminal]
player-operation-mode=cplayer
term-osd-bar
msg-module
msg-color

# SBS stereo: auto-crop to left eye for flat 2D view
# Ctrl+e clears filters + enables mpv360 for 360° mode
[vr-sbs]
profile-cond=width/height==2
vf=crop=w=iw/2:h=ih:x=0:y=0

# HTTP/HTTPS streams
[protocol.https]
cache-secs=60
demuxer-max-bytes=200MiB
demuxer-readahead-secs=30
network-timeout=10

[protocol.http]
profile=protocol.https

# YouTube (sponsorblock, prefer original audio)
[youtube]
profile-cond=path:find("youtu%.?be") ~= nil
ytdl-raw-options-append=sponsorblock-mark=all
ytdl-raw-options-append=mark-watched=
ytdl-raw-options-append=format-sort=lang:en

# Twitch (live streams: low latency, smaller buffer)
[twitch]
profile-cond=path:find("twitch.tv") ~= nil
cache-secs=5
demuxer-max-bytes=50MiB
demuxer-readahead-secs=5

